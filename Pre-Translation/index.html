<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Concept Generator</title>

  <style>
    :root{
      --bg: #e7e1d6;
      --panel: #f2ede4;
      --panel2:#fbf8f2;
      --ink: #2f2c22;
      --muted: #6a6457;
      --line: rgba(47,44,34,.14);

      --cta: #2f2c22;
      --ctaText: #f7f3ea;

      --radius: 18px;
      --shadow: 0 18px 45px rgba(0,0,0,.10);

      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --max: 980px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--ink);
      background:var(--bg);
      overflow-x:hidden;
    }

    /* Optional subtle background image (kept very low-contrast) */
   body::before{
  content:"";
  position:fixed;
  inset:0;
  background: url("bg.png");
  background-size:cover;
  background-position:center;
  z-index:-2;
  transform:scale(1.02);
}
  body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(900px 600px at 15% 10%, rgba(143,134,111,.12), transparent 60%),
    radial-gradient(900px 600px at 85% 10%, rgba(47,44,34,.18), transparent 60%),
    linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.18)); /* lighter */
  z-index:-1;
}

    .container{width:min(var(--max), 100%); margin:0 auto; padding:0 18px;}
    .page{min-height:100vh;}

    header{
      position:sticky; top:0; z-index:20;
      background:rgba(231,225,214,.86);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }
    .nav{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 0;
    }
    .brand{display:flex; align-items:center; gap:12px; min-width:0;}
    .brand img{height:30px; width:auto; display:block;}
    .brandTitle .kicker{
      font-size:11px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:800;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:48ch;
    }
    .brandTitle .title{
      font-size:14px;
      font-weight:950;
      letter-spacing:-.02em;
      text-transform:uppercase;
      line-height:1.1;
    }

    .navActions{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end;}
    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:rgba(251,248,242,.85);
      color:var(--ink);
      padding:12px 14px;
      border-radius:14px;
      font-weight:950;
      font-size:13px;
      letter-spacing:.10em;
      text-transform:uppercase;
      cursor:pointer;
      transition: transform .08s ease, filter .12s ease, box-shadow .12s ease;
    }
    .btn:hover{filter:brightness(1.02)}
    .btn:active{transform:translateY(1px)}
    .btnPrimary{
      background: linear-gradient(180deg, var(--cta), #1f1d16);
      color:var(--ctaText);
      border-color: rgba(47,44,34,.35);
      box-shadow: 0 14px 32px rgba(0,0,0,.16);
    }
    .btnGhost{background: rgba(251,248,242,.70);}

    main{padding:22px 0 28px;}

    .card{
      background: rgba(242,237,228,.82);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px;
    }

    .hKicker{
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:900;
    }
    .h1{
      margin:6px 0 0;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing:-.04em;
      line-height:1.06;
      font-weight:980;
      text-transform:uppercase;
    }
    .sub{
      margin:10px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      max-width: 68ch;
    }

    .formula{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(251,248,242,.72);
      border:1px solid rgba(47,44,34,.10);
      font-family:var(--mono);
      font-size:12.5px;
      color:var(--ink);
      overflow:auto;
      white-space:nowrap;
    }

    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(143,134,111,.16);
      border:1px solid rgba(143,134,111,.24);
      color: var(--ink);
      font-weight:950;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:11.5px;
      white-space:nowrap;
    }

    .output{
      margin-top:14px;
      padding:16px;
      border-radius:18px;
      background: rgba(251,248,242,.82);
      border:1px solid rgba(47,44,34,.12);
    }
    .outputLabel{
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:900;
      margin-bottom:8px;
    }
    .concept{
      font-size: clamp(18px, 2.2vw, 24px);
      line-height:1.25;
      font-weight:980;
      letter-spacing:-.02em;
      color:var(--ink);
    }
    .concept span{
      display:inline-block;
      padding:3px 10px;
      border-radius:999px;
      background: rgba(143,134,111,.18);
      border: 1px solid rgba(143,134,111,.28);
      margin:2px 0;
    }
    .toast{
      margin-top:10px;
      min-height:18px;
      font-size:13px;
      color:var(--muted);
      line-height:1.25;
    }

    .srOnly{
      position:absolute;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }

    footer{
      padding:18px 0 24px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .footerRow{
      border-top:1px solid var(--line);
      padding-top:14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="container">
        <div class="nav">
          <div class="brand">
            <img src="sae-logo.png" alt="SAE University College" />
            <div class="brandTitle">
              <div class="kicker">Story Development Tool</div>
              <div class="title">Concept Generator</div>
            </div>
          </div>

          <div class="navActions">
            <button class="btn btnPrimary" id="mashBtn" type="button" aria-label="Mash (random concept)">Mash</button>
            <button class="btn btnGhost" id="copyBtn" type="button" aria-label="Copy concept">Copy</button>
            <button class="btn btnGhost" id="helpBtn" type="button" aria-label="Help">?</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="card">
          <div class="hKicker">From Idea to Impact</div>
          <h2 class="h1">Build one strong concept</h2>
          <p class="sub">Press <b>Mash</b> a few times. Stop when one feels interesting. Then <b>Copy</b>.</p>
          <div class="formula">A (character) must (goal) in a (world) because (reason)</div>

          <div class="bar">
            <div class="pill" id="comboCount">0 concepts tried</div>
          </div>

          <div class="output">
            <div class="outputLabel">Current concept</div>
            <div class="concept" id="sentence"></div>
            <div class="toast" id="toast"></div>
            <span class="srOnly" id="ariaStatus" aria-live="polite"></span>
          </div>
        </section>
      </div>
    </main>


  <script>
    // (Core logic unchanged)
    const OPTIONS = {
      character: [
        "street singer",
        "stranger stranded",
        "best friend",
        "newcomer",
        "young teacher",
        "single parent",
        "new employee",
        "local journalist",
        "small-time criminal",
        "online creator"
      ],
      goal: [
        "must escape",
        "must fix a mistake before the police charge them for it",
        "must tell the truth online before a lie about them destroys their life",
        "trying to escape a violent past must stay calm",
        "must find someone who vanished",
        "must protect a secret",
        "must win a contest",
        "must deliver something important",
        "must stop a plan",
        "must keep a promise"
      ],
      world: [
        "a city full of cameras",
        "a small town",
        "an online world",
        "a small town",
        "a big city",
        "a school",
        "a workplace",
        "a music festival",
        "a family home",
        "a long trip"
      ],
      reason: [
        "someone is tracking their every move online",
        "they are being blamed",
        "they want to prove themselves",
        "one mistake could reveal who they really are",
        "time is running out",
        "someone they love is in danger",
        "they need money",
        "they feel guilty",
        "someone is watching",
        "no one else will do it"
      ]
    };

    const PRESETS = [
      {
        character: "street singer",
        goal: "must escape",
        world: "a city full of cameras",
        reason: "someone is tracking their every move online",
        exact: "A street singer must escape a city full of cameras because someone is tracking their every move online."
      },
      {
        character: "stranger stranded",
        goal: "must fix a mistake before the police charge them for it",
        world: "a small town",
        reason: "they are being blamed",
        exact: "A stranger stranded in a small town must fix a mistake before the police charge them for it."
      },
      {
        character: "best friend",
        goal: "must tell the truth online before a lie about them destroys their life",
        world: "an online world",
        reason: "they want to prove themselves",
        exact: "A best friend must tell the truth online before a lie about them destroys their life."
      },
      {
        character: "newcomer",
        goal: "trying to escape a violent past must stay calm",
        world: "a small town",
        reason: "one mistake could reveal who they really are",
        exact: "A newcomer trying to escape a violent past must stay calm in a small town because one mistake could reveal who they really are."
      }
    ];

    const els = {
      sentence: document.getElementById("sentence"),
      toast: document.getElementById("toast"),
      comboCount: document.getElementById("comboCount"),
      ariaStatus: document.getElementById("ariaStatus"),
      mashBtn: document.getElementById("mashBtn"),
      copyBtn: document.getElementById("copyBtn"),
      helpBtn: document.getElementById("helpBtn")
    };

    // Hidden selects keep the same data model
    const hidden = {
      character: document.createElement("select"),
      goal: document.createElement("select"),
      world: document.createElement("select"),
      reason: document.createElement("select")
    };

    let tries = 0;

    function fillSelect(selectEl, arr){
      selectEl.innerHTML = "";
      arr.forEach((txt) => {
        const opt = document.createElement("option");
        opt.value = txt;
        opt.textContent = txt;
        selectEl.appendChild(opt);
      });
    }

    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function presetHTML(p){
      return `A <span>${escapeHTML(p.character)}</span> <span>${escapeHTML(p.goal)}</span> in <span>${escapeHTML(p.world)}</span> because <span>${escapeHTML(p.reason)}</span>.`;
    }

    function buildSentence(){
      const c = hidden.character.value;
      const g = hidden.goal.value;
      const w = hidden.world.value;
      const r = hidden.reason.value;

      for (const p of PRESETS){
        if (p.character === c && p.goal === g && p.world === w && p.reason === r){
          return { html: presetHTML(p), plain: p.exact, isPreset:true };
        }
      }

      const plain = `A ${c} ${g} in ${w} because ${r}.`;
      const html  = `A <span>${escapeHTML(c)}</span> <span>${escapeHTML(g)}</span> in <span>${escapeHTML(w)}</span> because <span>${escapeHTML(r)}</span>.`;
      return { html, plain, isPreset:false };
    }

    function announce(msg){
      if (!els.ariaStatus) return;
      els.ariaStatus.textContent = msg;
    }

    function bumpTries(){
      tries += 1;
      els.comboCount.textContent = `${tries} concepts tried`;
    }

    function render({silent=false} = {}){
      const out = buildSentence();
      els.sentence.innerHTML = out.html;
      if (!silent) bumpTries();

      if (out.isPreset){
        els.toast.textContent = "Example loaded (exact wording).";
        announce("Preset concept loaded.");
      } else {
        els.toast.textContent = "";
        announce("Concept updated.");
      }
      return out.plain;
    }

    function pickRandom(selectEl){
      const n = selectEl.options.length;
      selectEl.selectedIndex = Math.floor(Math.random() * n);
    }

    function randomizeAll(){
      pickRandom(hidden.character);
      pickRandom(hidden.goal);
      pickRandom(hidden.world);
      pickRandom(hidden.reason);
      render();
    }

    function setSelectToValue(selectEl, value){
      const idx = Array.from(selectEl.options).findIndex(o => o.value === value);
      if (idx >= 0) selectEl.selectedIndex = idx;
    }

    function loadPreset(i){
      const p = PRESETS[i];
      setSelectToValue(hidden.character, p.character);
      setSelectToValue(hidden.goal, p.goal);
      setSelectToValue(hidden.world, p.world);
      setSelectToValue(hidden.reason, p.reason);
      render({silent:true});
      els.toast.textContent = "Example loaded (exact wording).";
      announce("Preset concept loaded.");
    }

    async function copyConcept(){
      const text = buildSentence().plain;
      try{
        await navigator.clipboard.writeText(text);
        els.toast.textContent = "Copied!";
        announce("Copied to clipboard.");
      }catch(e){
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        els.toast.textContent = "Copied!";
        announce("Copied to clipboard.");
      }
    }

    function showHelp(){
      alert(
`How to use:
1) Press Mash a few times.
2) Stop when it feels interesting.
3) Press Copy.

Shortcuts:
• Space = Mash
• C = Copy
• 1–4 = Presets (examples)`
      );
    }

    // Init
    fillSelect(hidden.character, OPTIONS.character);
    fillSelect(hidden.goal, OPTIONS.goal);
    fillSelect(hidden.world, OPTIONS.world);
    fillSelect(hidden.reason, OPTIONS.reason);

    // Start with preset 1 (same behaviour as earlier)
    loadPreset(0);
    tries = 0;
    els.comboCount.textContent = "0 concepts tried";
    render({silent:true});

    // Buttons
    els.mashBtn.addEventListener("click", randomizeAll);
    els.copyBtn.addEventListener("click", copyConcept);
    els.helpBtn.addEventListener("click", showHelp);

    // Keyboard shortcuts
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); randomizeAll(); }
      if (e.key.toLowerCase() === "c") { copyConcept(); }
      if (["1","2","3","4"].includes(e.key)) { loadPreset(Number(e.key) - 1); }
    });
  </script>
</body>
</html>
